# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2

$edp_enable = hyprctl keyword monitor "eDP-1, 2560x1600@120, 0x0, 1.25" & hyprctl keyword "device[elan901c:00-04f3:2f18]:enabled" true
$edp_disable = hyprctl keyword monitor "eDP-1, disable" & hyprctl keyword "device[elan901c:00-04f3:2f18]:enabled" false

# trigger when the switch is turning off
bindl = , switch:off:Lid Switch,exec,&edp_enable
# trigger when the switch is turning on
bindl = , switch:on:Lid Switch,exec,$edp_disable
